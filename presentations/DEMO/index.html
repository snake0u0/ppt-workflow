<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>제목</title>
    <!-- 폰트(fonts.css)·인쇄(deck-print.css)·라이트박스는 뷰어가 자동 주입. 테마 토큰은 아래 링크. -->
    <link rel="stylesheet" href="/shared/themes/supabase.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #0b0b0c; overflow: hidden; }

      /* 16:9 논리 캔버스(1280x720) → 화면/용지에 맞춰 scale */
      #stage { position: fixed; inset: 0; display: grid; place-items: center; }
      #deck { width: 1280px; height: 720px; position: relative; transform-origin: center center; }

      /* ===== Slide frame (white canvas, no gradient) ===== */
      .slide {
        position: absolute; inset: 0; display: none; overflow: hidden;
        background: var(--canvas); color: var(--ink);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }
      .slide.active { display: block; }
      .pad { position: absolute; inset: 0; padding: 72px 88px 60px; display: flex; flex-direction: column; }

      strong, b { color: var(--ink); font-weight: 500; }

      .pageno {
        position: absolute; right: 32px; bottom: 24px; font-size: 12px;
        color: var(--ink-mute-2); font-variant-numeric: tabular-nums; z-index: 3;
      }

      /* ===== Cover ===== */
      .cover { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 0 96px; }
      .cover .dot { width: 10px; height: 10px; border-radius: 999px; background: var(--primary); margin-bottom: 28px; }
      .cover h1 {
        font-family: var(--font-display); font-weight: 500; font-size: 64px; line-height: 1.1;
        letter-spacing: -1.92px; color: var(--ink);
      }
      .cover .author { margin-top: 24px; font-size: 18px; line-height: 1.55; color: var(--ink-mute); }

      /* ===== Section heading ===== */
      .shead h2 {
        font-family: var(--font-display); font-weight: 500; font-size: 28px; line-height: 1.2;
        letter-spacing: -0.42px; color: var(--ink); margin-bottom: 36px;
      }

      /* ===== TOC ===== */
      .toc-wrap { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; }
      .toc { list-style: none; display: flex; flex-direction: column; gap: 24px; }
      .toc li { display: flex; align-items: baseline; gap: 16px; font-size: 19px; font-weight: 400; color: var(--ink); }
      .toc li .n { color: var(--primary-deep); font-weight: 500; min-width: 22px; font-variant-numeric: tabular-nums; }

      /* ===== Figure (product-mockup style: rounded container + hairline + shadow) ===== */
      .figwrap { flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center; }
      figure.fig {
        max-width: 100%; max-height: 100%; border-radius: 12px; border: 1px solid var(--hairline);
        box-shadow: 0 8px 24px rgba(0,0,0,0.08); overflow: hidden; background: var(--canvas);
      }
      figure.fig img { display: block; max-width: 100%; max-height: 100%; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="deck">

        <!-- 1 · 표지 -->
        <section class="slide active">
          <div class="cover">
            <div class="dot"></div>
            <h1>제목</h1>
            <div class="author">김도형</div>
          </div>
          <div class="pageno">1 / 3</div>
        </section>

        <!-- 2 · 목차 -->
        <section class="slide">
          <div class="pad">
            <div class="shead"><h2>목차</h2></div>
            <div class="toc-wrap">
              <ol class="toc">
                <li><span class="n">1.</span>서론</li>
                <li><span class="n">2.</span>방법론</li>
              </ol>
            </div>
          </div>
          <div class="pageno">2 / 3</div>
        </section>

        <!-- 3 · 이미지 -->
        <section class="slide">
          <div class="pad">
            <div class="figwrap">
              <figure class="fig">
                <img src="assets/fig1.png" alt="config" />
              </figure>
            </div>
          </div>
          <div class="pageno">3 / 3</div>
        </section>

      </div>
    </div>

    <nav class="navdots" id="navdots"></nav>
    <div class="hint">← → · PgUp/PgDn · 클릭으로 이동</div>

    <style>
      .navdots { position: fixed; left: 50%; bottom: 11px; transform: translateX(-50%); display: flex; gap: 7px; z-index: 50; }
      .navdots button { width: 7px; height: 7px; border-radius: 50%; border: 0; background: var(--hairline-strong); cursor: pointer; padding: 0; }
      .navdots button.on { background: var(--primary-deep); }
      .hint { position: fixed; right: 14px; bottom: 11px; font-size: 11px; color: var(--ink-mute-2); z-index: 50; }
      @media print { .navdots, .hint { display: none !important; } }
    </style>

    <script>
      (function () {
        var deck = document.getElementById("deck");
        var slides = [].slice.call(deck.querySelectorAll(".slide"));
        var navWrap = document.getElementById("navdots");
        var i = 0;
        slides.forEach(function (s, idx) {
          var b = document.createElement("button");
          b.setAttribute("aria-label", "Slide " + (idx + 1));
          b.addEventListener("click", function (e) { e.stopPropagation(); show(idx); });
          navWrap.appendChild(b);
        });
        var navBtns = [].slice.call(navWrap.children);
        function show(n) {
          i = Math.max(0, Math.min(slides.length - 1, n));
          slides.forEach(function (s, idx) { s.classList.toggle("active", idx === i); });
          navBtns.forEach(function (b, idx) { b.classList.toggle("on", idx === i); });
        }
        function fit() {
          var s = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
          deck.style.transform = "scale(" + s + ")";
        }
        window.addEventListener("resize", fit);
        document.addEventListener("keydown", function (e) {
          if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") { e.preventDefault(); show(i + 1); }
          else if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); show(i - 1); }
          else if (e.key === "Home") show(0);
          else if (e.key === "End") show(slides.length - 1);
        });
        document.addEventListener("click", function () { show(i + 1); });
        function fromHash() { var n = parseInt((location.hash || "").slice(1), 10); return isNaN(n) ? 0 : n - 1; }
        window.addEventListener("hashchange", function () { show(fromHash()); });
        fit();
        show(fromHash());
      })();
    </script>
  </body>
</html>
